name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:

    runs-on: self-hosted

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Login to DockerHub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

    # Build Backend Image
    - name: Build Backend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/learning-backend:${{ github.sha }} ./backend

    # Push Backend Image
    - name: Push Backend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/learning-backend:${{ github.sha }}

    # Build Frontend Image
    - name: Build Frontend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/learning-frontend:${{ github.sha }} ./frontend

    # Push Frontend Image
    - name: Push Frontend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/learning-frontend:${{ github.sha }}

    # Deploy Backend
    - name: Deploy Backend
      run: |
        kubectl set image deployment/backend backend=${{ secrets.DOCKER_USERNAME }}/learning-backend:${{ github.sha }}
        kubectl rollout status deployment/backend

    # Deploy Frontend
    - name: Deploy Frontend
      run: |
        kubectl set image deployment/frontend frontend=${{ secrets.DOCKER_USERNAME }}/learning-frontend:${{ github.sha }}
        kubectl rollout status deployment/frontend